<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IRONPEAK — Gym Management</title>
  <link rel="stylesheet" href="CSS/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>

  <header>
    <div class="brand">
      <div class="brand-icon">⚡</div>
      <div>
        <h1>IRON<span>PEAK</span></h1>
        <p class="tagline">Gym Management System</p>
      </div>
    </div>
    <nav class="main-nav">
      <button class="nav-btn active" data-page="dashboard">📊 Dashboard</button>
      <button class="nav-btn" data-page="members">👥 Member</button>
    </nav>
    <div class="clock-box">
      <span id="live-time"></span>
      <span id="live-date"></span>
    </div>
  </header>

  <!-- DASHBOARD -->
  <div class="page active" id="page-dashboard">
    <div class="dashboard-wrap">

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon">👥</div>
          <div>
            <div class="stat-num" id="d-total">0</div>
            <div class="stat-label">Total Member</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">✅</div>
          <div>
            <div class="stat-num" id="d-active">0</div>
            <div class="stat-label">Member Aktif</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">❌</div>
          <div>
            <div class="stat-num" id="d-expired">0</div>
            <div class="stat-label">Member Expired</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">⚠️</div>
          <div>
            <div class="stat-num" id="d-expiring">0</div>
            <div class="stat-label">Hampir Expired</div>
          </div>
        </div>
      </div>

      </div>

    </div>
  </div>

  <!-- MEMBERS -->
  <div class="page" id="page-members">
    <div class="split-layout">

      <aside class="form-panel">
        <div class="panel-head">
          <h3 id="member-form-title">➕ Daftar Member</h3>
          <span class="badge" id="member-badge">Baru</span>
        </div>
        <div class="form-body">
          <input type="hidden" id="m-edit-id"/>
          <div class="field-group">
            <label>Nama Lengkap *</label>
            <input type="text" id="m-name" placeholder="contoh: Budi Santoso"/>
          </div>
          <div class="field-group">
            <label>No. HP *</label>
            <input type="text" id="m-phone" placeholder="08xxxxxxxxxx"/>
          </div>
          <div class="field-group">
            <label>Jenis Kelamin *</label>
            <select id="m-gender">
              <option value="">-- Pilih --</option>
              <option value="Laki-laki">Laki-laki</option>
              <option value="Perempuan">Perempuan</option>
            </select>
          </div>
          <div class="field-group">
            <label>Paket *</label>
            <select id="m-package">
              <option value="Basic">Basic (1 Bulan) — Rp 150.000</option>
              <option value="Silver">Silver (3 Bulan) — Rp 400.000</option>
              <option value="Gold">Gold (6 Bulan) — Rp 700.000</option>
              <option value="Platinum">Platinum (12 Bulan) — Rp 1.200.000</option>
            </select>
          </div>
          <div class="field-group">
            <label>Tanggal Mulai *</label>
            <input type="date" id="m-start"/>
          </div>
          <div class="field-group">
            <label>Catatan</label>
            <input type="text" id="m-notes" placeholder="catatan tambahan..."/>
          </div>
          <div class="form-actions">
            <button class="btn-primary" id="m-submit">Daftarkan</button>
            <button class="btn-ghost" id="m-cancel" style="display:none">Batal</button>
          </div>
        </div>
      </aside>

      <div class="table-panel">
        <div class="panel-head">
          <h3>👥 Data Member</h3>

        </div>
        <div class="filter-row">
          <button class="ftab active" data-mf="Semua">Semua</button>
          <button class="ftab" data-mf="Aktif">Aktif</button>
          <button class="ftab" data-mf="Expired">Expired</button>
        </div>
        <div class="tbl-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Nama</th>
                <th>Gender</th>
                <th>Paket</th>
                <th>Mulai</th>
                <th>Expired</th>
                <th>Status</th>
                <th>Aksi</th>
              </tr>
            </thead>
            <tbody id="m-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
  <script src="JS/script.js"></script>
</body>
</html>
